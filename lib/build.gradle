allprojects {
    group = 'org.maxim'
    version = '1.0.0'

    repositories {
        mavenCentral()
    }
}

subprojects {
    plugins.withType(JavaPlugin).tap {
        configureEach {
            java {
                toolchain {
                    languageVersion = JavaLanguageVersion.of(21)
                }
            }
        }
    }
}
