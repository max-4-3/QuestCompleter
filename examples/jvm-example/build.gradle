plugins {
    id 'application'
}

repositories {
    mavenCentral()
}

application {
    mainClass = "org.maxim.example.Main"
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

dependencies {
    implementation project(':lib:quest-core')
    implementation "tools.jackson.core:jackson-core:3.0.4"
    implementation "tools.jackson.core:jackson-databind:3.0.4"
}
